<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ladybug — retro dev</title>
  <link rel="stylesheet" href="/static/app.css" />
  <script type="module" src="/static/app.js"></script>
</head>
<body>
  <header id="statusbar">
    <span class="brand">ladybug</span>
    <span id="status-instance">— no instance —</span>
    <span id="status-build"></span>
    <span class="spacer"></span>
    <button id="btn-build">Build</button>
  </header>

  <main id="layout">
    <aside id="pane-instances">
      <instance-list></instance-list>
    </aside>
    <section id="pane-left">
      <framebuffer-view></framebuffer-view>
      <register-view></register-view>
    </section>
    <section id="pane-center">
      <source-view></source-view>
      <memory-view></memory-view>
    </section>
    <section id="pane-right">
      <logs-view></logs-view>
    </section>
  </main>
</body>
</html>
